networks:
  default:
    name: rapptor
    external: true
volumes:
  rapptor-user-data:
    external: true
  nextcloud:
services:
  app.rapptor.nextcloud:
    image: ghcr.io/rapptorvpn/rapptor.app.rapptor.nextcloud:31.0.14
    container_name: app.rapptor.nextcloud
    volumes:
      - rapptor-user-data:/files:rw
      - nextcloud:/var/www/html:rw
    environment:
      NEXTCLOUD_ADMIN_USER: 'admin'
      NEXTCLOUD_ADMIN_PASSWORD: '#{randomStr(42)}'
      SQLITE_DATABASE: 'sqlite'
      NEXTCLOUD_TRUSTED_DOMAINS: "app-rapptor-nextcloud.${RAPPTOR_BASE_DOMAIN}"
      OVERWRITEPROTOCOL: https
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:80 || exit 1
      interval: 30s
      retries: 3
      start_interval: 1s
      start_period: 30s
      timeout: 10s
    logging:
      driver: none
  app.rapptor.nextcloud.cron:
    image: ghcr.io/rapptorvpn/rapptor.app.rapptor.nextcloud:31.0.14
    container_name: app.rapptor.nextcloud.cron
    volumes:
      - nextcloud:/var/www/html:rw
      - rapptor-user-data:/files:rw
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: "app-rapptor-nextcloud.${RAPPTOR_BASE_DOMAIN}"
      OVERWRITEPROTOCOL: https
    restart: unless-stopped
    entrypoint: /cron.sh
