version: '3.4'

networks:
  default:
    name: rapptor
    external: true
volumes:
  rapptor-data:
    external: true
services:
  app.93million.plex:
    image: lscr.io/linuxserver/plex:1.40.3
    container_name: app.93million.plex
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - VERSION=docker
    volumes:
      - ./data/config:/config:rw
      - rapptor-data:/files:rw
    ports:
      - 32400:32400/tcp
    restart: unless-stopped
