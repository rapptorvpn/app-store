networks:
  default:
    name: rapptor
    external: true
services:
  app.rapptor.wg-easy:
    environment:
      - WG_HOST=${RAPPTOR_BASE_DOMAIN}
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_DEFAULT_DNS=8.8.4.4
      - WG_MTU=1280
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: app.rapptor.wg-easy
    volumes:
      - ./data/etc:/etc/wireguard
    ports:
      - "51820:51820/udp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    healthcheck:
      test: wget --spider http://127.0.0.1:51821/ || exit 1
      interval: 30s
      retries: 3
      start_interval: 1s
      start_period: 30s
      timeout: 10s
