version: "3.8"

networks:
  default:
    name: punk
    external: true
services:
  app.93million.wg-easy:
    environment:
      - WG_HOST=${RAPPTOR_BASE_DOMAIN}
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_DEFAULT_DNS=8.8.4.4
      - WG_MTU=1280
    image: ghcr.io/wg-easy/wg-easy:13
    container_name: app.93million.wg-easy
    volumes:
      - ./data/etc:/etc/wireguard
    ports:
      - "51820:51820/udp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
